<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>食べもの帳</title>
  <meta property="og:title" content="食べもの帳" />
  <meta property="og:description" content="LINEで食事を記録。カロリー・PFCを自動で管理。" />
  <meta property="og:image" content="https://og-api-self.vercel.app/api/og?title=%E9%A3%9F%E3%81%B9%E3%82%82%E3%81%AE%E5%B8%B3&category=Tools%20%26%20Utility" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --primary: #1F61F7;
      --accent: #FF5C24;
      --bg: #E5E5E5;
      --card: #FFFFFF;
      --text: #1a1a1a;
      --text-sub: #888;
      --border: #D5D5D5;
      --radius: 16px;
    }

    body {
      background: var(--bg);
      font-family: 'Inter', 'Noto Sans JP', sans-serif;
      color: var(--text);
      min-height: 100vh;
    }

    /* ---- Layout ---- */
    .page {
      display: flex;
      min-height: 100vh;
    }

    /* ---- Sidebar ---- */
    .sidebar {
      width: 72px;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0;
      position: fixed;
      top: 0;
      left: 0;
      height: 100vh;
      z-index: 10;
    }
    .sidebar-logo {
      width: 40px;
      height: 40px;
      background: var(--primary);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-weight: 900;
      font-size: 1.1rem;
      margin-bottom: 32px;
    }
    .sidebar nav {
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }
    .nav-item {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      color: var(--text-sub);
      font-size: 1.2rem;
    }
    .nav-item:hover { background: var(--bg); color: var(--text); }
    .nav-item.active { background: var(--primary); color: #fff; }
    .sidebar-bottom {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    /* ---- Main ---- */
    .main {
      margin-left: 72px;
      flex: 1;
      padding: 40px 40px 64px;
      max-width: 960px;
    }

    /* ---- Header ---- */
    .page-header {
      margin-bottom: 36px;
    }
    .page-header h1 {
      font-size: 2.6rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      line-height: 1.1;
      color: var(--text);
    }
    .page-header h1 .accent { color: var(--accent); }
    .page-header p {
      font-size: 0.9rem;
      color: var(--text-sub);
      margin-top: 8px;
      font-weight: 500;
    }

    /* ---- Cards Grid ---- */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    .grid .span-2 { grid-column: span 2; }

    .card {
      background: var(--card);
      border-radius: var(--radius);
      padding: 24px;
      border: 1px solid var(--border);
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.06);
    }
    .card-label {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--text-sub);
      margin-bottom: 12px;
    }

    /* ---- Summary Card (blue hero) ---- */
    .card-hero {
      background: var(--primary);
      color: #fff;
      border: none;
      position: relative;
      overflow: hidden;
    }
    .card-hero::after {
      content: '';
      position: absolute;
      top: -40px;
      right: -40px;
      width: 140px;
      height: 140px;
      background: rgba(255,255,255,0.08);
      border-radius: 50%;
    }
    .card-hero .card-label { color: rgba(255,255,255,0.6); }
    .hero-kcal {
      font-size: 3.6rem;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.03em;
    }
    .hero-kcal .unit {
      font-size: 1rem;
      font-weight: 500;
      opacity: 0.6;
      margin-left: 4px;
    }

    /* ---- PFC Chips ---- */
    .pfc-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .pfc-chip {
      flex: 1;
      text-align: center;
      background: rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px 6px;
    }
    .pfc-chip .chip-label {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      opacity: 0.6;
    }
    .pfc-chip .chip-value {
      font-size: 1.5rem;
      font-weight: 900;
      margin-top: 2px;
    }
    .pfc-chip .chip-unit {
      font-size: 0.65rem;
      opacity: 0.5;
    }

    /* ---- Log List ---- */
    .log-list { list-style: none; }
    .log-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid #eee;
    }
    .log-item:last-child { border-bottom: none; }
    .food-name {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .food-time {
      font-size: 0.75rem;
      color: var(--text-sub);
      margin-top: 2px;
    }
    .food-kcal {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--accent);
      white-space: nowrap;
    }

    /* ---- Charts ---- */
    .chart-wrap {
      position: relative;
      width: 100%;
    }
    .chart-wrap canvas { width: 100% !important; }
    .pfc-chart-wrap {
      max-width: 180px;
      margin: 0 auto;
    }

    /* ---- Empty ---- */
    .empty {
      text-align: center;
      padding: 28px 16px;
      color: var(--text-sub);
      font-size: 0.9rem;
    }

    /* ---- Footer ---- */
    footer {
      text-align: center;
      margin-top: 40px;
      font-size: 0.75rem;
      color: #aaa;
      letter-spacing: 0.04em;
    }

    /* ---- Decorative dots ---- */
    .deco-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      display: inline-block;
    }
    .dot-blue { background: var(--primary); }
    .dot-orange { background: var(--accent); }

    /* ---- Responsive ---- */
    @media (max-width: 640px) {
      .sidebar { display: none; }
      .main {
        margin-left: 0;
        padding: 24px 16px 48px;
      }
      .page-header h1 { font-size: 2rem; }
      .grid { grid-template-columns: 1fr; }
      .grid .span-2 { grid-column: span 1; }
      .hero-kcal { font-size: 2.8rem; }

      /* Mobile nav bar */
      .mobile-nav {
        display: flex;
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--card);
        border-top: 1px solid var(--border);
        padding: 8px 0;
        z-index: 10;
        justify-content: center;
        gap: 8px;
      }
    }
    @media (min-width: 641px) {
      .mobile-nav { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-logo">食</div>
      <nav>
        <div class="nav-item active" title="ダッシュボード">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        </div>
        <div class="nav-item" title="カロリー推移">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div class="nav-item" title="PFCバランス">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
        </div>
      </nav>
      <div class="sidebar-bottom">
        <div class="deco-dot dot-orange"></div>
        <div class="deco-dot dot-blue"></div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <div class="page-header">
        <h1>食事<span class="accent">.</span></h1>
        <p>LINEで記録 &mdash; カロリー・PFCを自動管理</p>
      </div>

      <div class="grid">
        <!-- Hero Summary -->
        <div class="card card-hero span-2">
          <div class="card-label">Today</div>
          <div class="hero-kcal" id="total-kcal">—<span class="unit">kcal</span></div>
          <div class="pfc-row">
            <div class="pfc-chip">
              <div class="chip-label">Protein</div>
              <div class="chip-value" id="total-p">—</div>
              <div class="chip-unit">g</div>
            </div>
            <div class="pfc-chip">
              <div class="chip-label">Fat</div>
              <div class="chip-value" id="total-f">—</div>
              <div class="chip-unit">g</div>
            </div>
            <div class="pfc-chip">
              <div class="chip-label">Carbs</div>
              <div class="chip-value" id="total-c">—</div>
              <div class="chip-unit">g</div>
            </div>
          </div>
        </div>

        <!-- Log -->
        <div class="card span-2">
          <div class="card-label">Log</div>
          <ul class="log-list" id="log-list">
            <li class="empty">データを読み込み中...</li>
          </ul>
        </div>

        <!-- 7-day Chart -->
        <div class="card">
          <div class="card-label">7-Day Calories</div>
          <div class="chart-wrap">
            <canvas id="calorie-chart" height="200"></canvas>
          </div>
        </div>

        <!-- PFC Doughnut -->
        <div class="card">
          <div class="card-label">PFC Balance</div>
          <div class="chart-wrap pfc-chart-wrap">
            <canvas id="pfc-chart" height="200"></canvas>
          </div>
        </div>
      </div>

      <footer>食べもの帳 &mdash; LINE Bot</footer>
    </main>

    <!-- Mobile bottom nav -->
    <div class="mobile-nav">
      <div class="nav-item active">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      </div>
      <div class="nav-item">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
      </div>
      <div class="nav-item">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></svg>
      </div>
    </div>
  </div>

  <script>
    var GAS_API_URL = 'https://script.google.com/macros/s/AKfycbx71k_S5LSSmZ2mCDSriFuQOz7I2YBJk1D1NO9aMIMaV3-O6DglLMpgylbUqNB5j7EKmw/exec';

    // ---- Helpers ----
    function toJSTDateStr(d) {
      var dt = new Date(d);
      var offset = dt.getTime() + 9 * 60 * 60 * 1000;
      var jst = new Date(offset);
      return jst.getUTCFullYear() + '-'
        + String(jst.getUTCMonth() + 1).padStart(2, '0') + '-'
        + String(jst.getUTCDate()).padStart(2, '0');
    }

    function toJSTTimeStr(d) {
      var dt = new Date(d);
      var offset = dt.getTime() + 9 * 60 * 60 * 1000;
      var jst = new Date(offset);
      return String(jst.getUTCHours()).padStart(2, '0') + ':'
        + String(jst.getUTCMinutes()).padStart(2, '0');
    }

    function todayStr() {
      return toJSTDateStr(new Date());
    }

    function last7Days() {
      var days = [];
      for (var i = 6; i >= 0; i--) {
        var d = new Date();
        d.setDate(d.getDate() - i);
        days.push(toJSTDateStr(d));
      }
      return days;
    }

    // ---- Fetch & Render ----
    function fetchData() {
      fetch(GAS_API_URL + '?action=getData')
        .then(function(r) { return r.json(); })
        .then(function(data) { render(data.logs || []); })
        .catch(function() { renderEmpty(); });
    }

    function render(logs) {
      var today = todayStr();
      var todayLogs = logs.filter(function(l) { return toJSTDateStr(l.timestamp) === today; });

      // Summary
      var cal = 0, p = 0, f = 0, c = 0;
      todayLogs.forEach(function(l) {
        cal += Number(l.totalCal) || 0;
        p   += Number(l.totalP)   || 0;
        f   += Number(l.totalF)   || 0;
        c   += Number(l.totalC)   || 0;
      });

      document.getElementById('total-kcal').innerHTML = cal + '<span class="unit">kcal</span>';
      document.getElementById('total-p').textContent  = p;
      document.getElementById('total-f').textContent  = f;
      document.getElementById('total-c').textContent  = c;

      // Log list
      var listEl = document.getElementById('log-list');
      if (todayLogs.length === 0) {
        listEl.innerHTML = '<li class="empty">今日の記録はまだありません</li>';
      } else {
        listEl.innerHTML = '';
        todayLogs.forEach(function(l) {
          var foods = [];
          try { foods = JSON.parse(l.foods); } catch(e) {}
          var time = toJSTTimeStr(l.timestamp);
          foods.forEach(function(fd) {
            var li = document.createElement('li');
            li.className = 'log-item';
            li.innerHTML = '<div><div class="food-name">' + fd.name + '</div>'
              + '<div class="food-time">' + time + '</div></div>'
              + '<div class="food-kcal">' + fd.cal + ' kcal</div>';
            listEl.appendChild(li);
          });
        });
      }

      // 7-day chart
      var days = last7Days();
      var dailyCal = days.map(function(day) {
        var total = 0;
        logs.forEach(function(l) {
          if (toJSTDateStr(l.timestamp) === day) total += Number(l.totalCal) || 0;
        });
        return total;
      });

      new Chart(document.getElementById('calorie-chart'), {
        type: 'line',
        data: {
          labels: days.map(function(d) { return d.slice(5); }),
          datasets: [{
            data: dailyCal,
            borderColor: '#1F61F7',
            backgroundColor: 'rgba(31,97,247,0.08)',
            fill: true,
            tension: 0.4,
            pointBackgroundColor: '#1F61F7',
            pointRadius: 5,
            pointHoverRadius: 7,
            borderWidth: 2.5
          }]
        },
        options: {
          plugins: { legend: { display: false } },
          scales: {
            y: { beginAtZero: true, grid: { color: '#eee' }, ticks: { font: { family: 'Inter' } } },
            x: { grid: { display: false }, ticks: { font: { family: 'Inter' } } }
          }
        }
      });

      // PFC doughnut
      var pfcTotal = p + f + c;
      new Chart(document.getElementById('pfc-chart'), {
        type: 'doughnut',
        data: {
          labels: ['Protein', 'Fat', 'Carbs'],
          datasets: [{
            data: pfcTotal > 0 ? [p, f, c] : [1, 1, 1],
            backgroundColor: ['#1F61F7', '#FF5C24', '#E5E5E5'],
            borderWidth: 0
          }]
        },
        options: {
          cutout: '68%',
          plugins: {
            legend: {
              position: 'bottom',
              labels: { font: { family: 'Inter', size: 11, weight: 600 }, padding: 14, usePointStyle: true, pointStyle: 'circle' }
            }
          }
        }
      });
    }

    function renderEmpty() {
      document.getElementById('log-list').innerHTML =
        '<li class="empty">データを取得できませんでした</li>';
    }

    // ---- Init ----
    fetchData();
  </script>
</body>
</html>
